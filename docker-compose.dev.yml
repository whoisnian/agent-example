# Local-development stack.
#
# Scope:
#   - init-api-scaffold:     postgres + rabbitmq (+ optional jaeger)
#   - init-worker-scaffold:  redis + seaweedfs (+ one-shot bucket init)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml --profile trace up -d   # adds jaeger
#
# Default credentials are dev-only and MUST NOT be reused in any deployed env.
#
# Image policy:
#   - Pin every image to a concrete version tag (no `:latest`) so the stack is
#     reproducible across contributors and CI.
#   - Redis is pinned to 7.2 — the last release under the BSD license. 7.4+ is
#     dual SSPL/RSAL and not acceptable for this project's dependency posture.
#   - SeaweedFS provides the S3-compatible object store on host port 9000.
services:
  postgres:
    image: postgres:18.4-alpine
    container_name: agent-example-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_example
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_example"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: agent-example-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- worker scaffold additions -----------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: agent-example-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage.
  # SeaweedFS S3 API listens on 8333 inside the container; we publish it on
  # host 9000 so OSS_ENDPOINT=http://localhost:9000 works out of the box.
  seaweedfs:
    image: chrislusf/seaweedfs:3.96
    container_name: agent-example-seaweedfs
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -s3
      - -s3.config=/etc/seaweed/s3-config.json
      - -ip=seaweedfs
    ports:
      - "9000:8333"     # S3 API
      - "9333:9333"     # Master (debug)
      - "8888:8888"     # Filer (debug)
    volumes:
      - seaweedfs-data:/data
      - ./infra/seaweedfs/s3-config.json:/etc/seaweed/s3-config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8333/ >/dev/null 2>&1 || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot bucket creator using the AWS CLI against SeaweedFS's S3 API.
  # `s3 mb` is idempotent (returns 200 / "BucketAlreadyOwnedByYou") so re-running
  # compose up is safe.
  seaweedfs-init:
    image: amazon/aws-cli:2.18.6
    container_name: agent-example-seaweedfs-init
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: dev-access-key
      AWS_SECRET_ACCESS_KEY: dev-secret-key
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        aws --endpoint-url http://seaweedfs:8333 s3 mb s3://worker-bucket 2>/dev/null || true
        echo "seaweedfs-init done"
    restart: "no"

  # Optional Jaeger v2 for local trace visualisation. Enable via `--profile trace`.
  # Jaeger 2.x is the OpenTelemetry-aligned line; v1 is in maintenance.
  jaeger:
    image: jaegertracing/jaeger:2.18.0
    container_name: agent-example-jaeger
    restart: unless-stopped
    profiles: ["trace"]
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

volumes:
  postgres-data:
  rabbitmq-data:
  seaweedfs-data:
