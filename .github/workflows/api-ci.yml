name: api-ci

on:
  push:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci.yml'

defaults:
  run:
    working-directory: api

jobs:
  vet-lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: api/go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        # golangci-lint-action v7+ required for golangci-lint v2.
        # `.golangci.yml` in the working directory is auto-discovered; no
        # explicit --config flag needed.
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: api
          version: v2.12.2

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...
